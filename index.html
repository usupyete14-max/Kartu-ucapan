<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kejutan Spesial Untukmu!</title>
    <style>
        :root {
            --primary-pink: #ff4d6d;
            --soft-pink: #ffb3c1;
            --dark-bg: #121212;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: var(--dark-bg);
            font-family: 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            color: white;
        }

        #main-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        /* --- KADO AWAL --- */
        #gift-box {
            position: absolute;
            width: 160px;
            height: 160px;
            background-color: var(--primary-pink);
            border-radius: 15px;
            box-shadow: 0 0 40px rgba(255, 77, 109, 0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 100;
        }

        #gift-box::before {
            content: "🎁";
            font-size: 80px;
        }

        #gift-box:hover {
            transform: scale(1.1) rotate(5deg);
        }

        #click-hint {
            position: absolute;
            bottom: -50px;
            font-size: 1.1rem;
            color: var(--soft-pink);
            animation: bounce 2s infinite;
            white-space: nowrap;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-10px);}
            60% {transform: translateY(-5px);}
        }

        /* --- KONTEN UTAMA (SETELAH KLIK) --- */
        #surprise-content {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 90%;
            max-width: 450px;
            opacity: 0;
            transition: opacity 1s ease;
            z-index: 10;
        }

        .message-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            margin-bottom: 30px;
            width: 100%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .message-card h1 {
            margin: 0 0 10px 0;
            font-size: 1.8rem;
            color: var(--primary-pink);
        }

        #typing-text {
            font-size: 1rem;
            line-height: 1.5;
            color: #eee;
            min-height: 3em;
        }

        /* --- MINI ALBUM (SWIPE BOOK) --- */
        .album-wrapper {
            position: relative;
            width: 220px;
            height: 280px;
            perspective: 1000px;
            margin-top: 20px;
        }

        .photo-card {
            position: absolute;
            width: 100%;
            height: 100%;
            background: white;
            border-radius: 12px;
            padding: 10px;
            box-sizing: border-box;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1), opacity 0.6s;
            cursor: grab;
            user-select: none;
            display: flex;
            flex-direction: column;
        }

        .photo-card img {
            width: 100%;
            height: 85%;
            object-fit: cover;
            border-radius: 8px;
            pointer-events: none;
        }

        .photo-card .caption {
            height: 15%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
            font-family: 'Dancing Script', cursive; /* Gunakan font cantik jika ada */
            font-size: 0.9rem;
            font-weight: bold;
        }

        /* Variasi rotasi tumpukan agar terlihat alami seperti buku/tumpukan kartu */
        .photo-card:nth-child(1) { transform: rotate(-2deg); z-index: 5; }
        .photo-card:nth-child(2) { transform: rotate(3deg); z-index: 4; }
        .photo-child:nth-child(3) { transform: rotate(-1deg); z-index: 3; }

        /* Kelas untuk kartu yang sudah di-swipe */
        .swiped {
            transform: translateX(-150%) rotate(-20deg) !important;
            opacity: 0;
            pointer-events: none;
        }

        /* --- PARTIKEL --- */
        .particle {
            position: absolute;
            pointer-events: none;
            z-index: 1;
        }

        @keyframes fall {
            to { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }

        #instruction {
            margin-top: 15px;
            font-size: 0.8rem;
            color: #888;
            font-style: italic;
        }

    </style>
</head>
<body>

    <div id="main-container">
        
        <!-- BAGIAN 1: KADO -->
        <div id="gift-box" onclick="triggerSurprise(event)">
            <div id="click-hint">Klik Kadonya! 🎁</div>
        </div>

        <!-- BAGIAN 2: ISI KEJUTAN -->
        <div id="surprise-content">
            <div class="message-card">
                <h1>HBD Sayang! ✨</h1>
                <p id="typing-text"></p>
            </div>

            <!-- MINI ALBUM -->
            <div class="album-wrapper" id="album">
                <!-- Kartu 3 -->
                <div class="photo-card" onclick="swipeCard(this)">
                    <img src="https://picsum.photos/seed/love3/300/400" alt="Foto 3">
                    <div class="caption">Bahagia Selalu! ❤️</div>
                </div>
                <!-- Kartu 2 -->
                <div class="photo-card" onclick="swipeCard(this)">
                    <img src="https://picsum.photos/seed/love2/300/400" alt="Foto 2">
                    <div class="caption">Momen Berharga ✨</div>
                </div>
                <!-- Kartu 1 (Paling Atas) -->
                <div class="photo-card" onclick="swipeCard(this)">
                    <img src="https://picsum.photos/seed/love1/300/400" alt="Foto 1">
                    <div class="caption">First Memory 🌹</div>
                </div>
            </div>
            
            <p id="instruction">Geser atau Klik kartu foto di atas ^</p>
        </div>

    </div>

    <script>
        const message = "Selamat ulang tahun ya! Semoga panjang umur, sehat selalu, dan semua impianmu tercapai. Aku selalu di sini buat dukung kamu. Love you! ❤️✨";
        let isTypingStarted = false;

        function triggerSurprise(e) {
            e.stopPropagation();
            const gift = document.getElementById('gift-box');
            const content = document.getElementById('surprise-content');

            // Efek ledakan partikel
            createExplosion(e.clientX, e.clientY);

            // Sembunyikan kado
            gift.style.transform = "scale(0)";
            gift.style.opacity = "0";

            setTimeout(() => {
                gift.style.display = "none";
                content.style.display = "flex";
                // Trigger Fade In
                setTimeout(() => {
                    content.style.opacity = "1";
                    startTyping();
                    startConfetti();
                }, 100);
            }, 400);
        }

        function startTyping() {
            if (isTypingStarted) return;
            isTypingStarted = true;
            const element = document.getElementById('typing-text');
            let i = 0;
            function type() {
                if (i < message.length) {
                    element.innerHTML += message.charAt(i);
                    i++;
                    setTimeout(type, 50);
                }
            }
            type();
        }

        // Fungsi untuk swipe kartu (Buku Foto)
        function swipeCard(card) {
            card.classList.add('swiped');
            
            // Jika kartu terakhir sudah di swipe, bisa direset atau biarkan kosong
            // Untuk demo ini, jika sudah habis kita munculkan kembali setelah 2 detik
            const remaining = document.querySelectorAll('.photo-card:not(.swiped)');
            if (remaining.length === 0) {
                setTimeout(() => {
                    document.querySelectorAll('.photo-card').forEach(c => c.classList.remove('swiped'));
                }, 1500);
            }
        }

        // Efek Ledakan Partikel
        function createExplosion(x, y) {
            for (let i = 0; i < 30; i++) {
                const p = document.createElement('div');
                p.classList.add('particle');
                p.innerHTML = ['❤️', '✨', '🌸', '⭐'][Math.floor(Math.random() * 4)];
                p.style.left = x + 'px';
                p.style.top = y + 'px';
                p.style.fontSize = Math.random() * 20 + 10 + 'px';
                
                const angle = Math.random() * Math.PI * 2;
                const dist = Math.random() * 150 + 50;
                const tx = Math.cos(angle) * dist;
                const ty = Math.sin(angle) * dist;

                p.animate([
                    { transform: 'translate(0, 0) scale(1)', opacity: 1 },
                    { transform: `translate(${tx}px, ${ty}px) scale(0)`, opacity: 0 }
                ], { duration: 1000, easing: 'ease-out' });

                document.body.appendChild(p);
                setTimeout(() => p.remove(), 1000);
            }
        }

        // Hujan Konfeti Latar Belakang
        function startConfetti() {
            setInterval(() => {
                const p = document.createElement('div');
                p.classList.add('particle');
                p.innerHTML = '❤️';
                p.style.left = Math.random() * 100 + 'vw';
                p.style.top = '-20px';
                p.style.opacity = Math.random();
                p.style.fontSize = Math.random() * 15 + 10 + 'px';
                p.style.animation = `fall ${Math.random() * 3 + 2}s linear forwards`;
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 5000);
            }, 300);
        }

        // Menambahkan swipe gesture sederhana untuk mobile
        let touchStartX = 0;
        document.getElementById('album').addEventListener('touchstart', e => {
            touchStartX = e.changedTouches[0].screenX;
        });

        document.getElementById('album').addEventListener('touchend', e => {
            let touchEndX = e.changedTouches[0].screenX;
            if (touchStartX - touchEndX > 50) { // Swipe kiri
                const cards = document.querySelectorAll('.photo-card:not(.swiped)');
                if (cards.length > 0) {
                    swipeCard(cards[cards.length - 1]);
                }
            }
        });

    </script>
</body>
</html>
